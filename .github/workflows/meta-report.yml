name: Meta Ads Daily Report
on:
  schedule:
    - cron: '0 1 * * *'  # 8h sáng VN
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install requests
    - run: python meta_ads_bot.py
      env:
        META_TOKEN: ${{ secrets.META_TOKEN }}
